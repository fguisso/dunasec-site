<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #080808;
      font-family: 'Share Tech Mono', monospace;
      position: relative;
    }

    /* circuito esquerda */
    .circ-l {
      position: absolute;
      left: 0; top: 0;
      height: 100%; width: 38%;
      object-fit: cover;
      object-position: right;
      opacity: .10;
    }

    /* circuito direita */
    .circ-r {
      position: absolute;
      right: 0; top: 0;
      height: 100%; width: 38%;
      object-fit: cover;
      object-position: left;
      opacity: .12;
    }

    /* glow vermelho centro-direita */
    .glow {
      position: absolute;
      right: 120px; top: 50%;
      transform: translateY(-50%);
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,0,64,.18) 0%, transparent 65%);
    }

    /* glow violeta centro */
    .glow2 {
      position: absolute;
      left: 40%; top: 30%;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(85,0,255,.10) 0%, transparent 65%);
    }

    /* borda vermelha superior */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #FF0040;
    }

    /* borda vermelha inferior */
    .bot-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: #FF0040;
    }

    /* conteúdo central */
    .content {
      position: relative;
      z-index: 2;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: #FF0040;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 32px; height: 1px;
      background: #FF0040;
    }

    .logo {
      height: 96px;
      margin-bottom: 14px;
    }

    .dns {
      height: 28px;
      opacity: .55;
      margin-bottom: 36px;
    }

    .rule {
      width: 48px; height: 2px;
      background: #FF0040;
      margin-bottom: 36px;
    }

    .meta {
      font-size: 15px;
      color: rgba(255,255,255,.55);
      letter-spacing: .14em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #FF0040;
      flex-shrink: 0;
    }

    .tagline {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,.3);
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .cta {
      margin-top: 28px;
      border: 1px solid #FF0040;
      color: #fff;
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 8px 24px;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      background: rgba(255,0,64,.12);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <img class="circ-l" src="./circuit_red_flip.png" />
  <img class="circ-r" src="./circuit_red.png" />
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="top-bar"></div>
  <div class="bot-bar"></div>

  <div class="content">
    <div class="eyebrow">01ª Edição &nbsp;·&nbsp; 2026</div>
    <img class="logo" src="./logo_branco.png" alt="DunaSec" />
    <img class="dns"  src="./dns_branco.png"  alt="dns" />
    <div class="rule"></div>
    <div class="meta">
      <span class="dot"></span>
      <span>30 de Maio de 2026</span>
      <span class="dot"></span>
      <span>Natal, RN</span>
      <span class="dot"></span>
      <span>Evento Presencial</span>
      <span class="dot"></span>
    </div>
    <div class="tagline">// O novo evento de cibersegurança do Nordeste</div>
    <div class="cta">Garanta seu ingresso · dunasec.com.br</div>
  </div>
</body>
</html>
